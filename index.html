<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>жҳҹиҫ°иӯ·зҗҶж—ҘиӘҢ</title>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="жҳҹиҫ°иӯ·зҗҶ"/>
<meta name="theme-color" content="#4A8F6B"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png"/>
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}

/* в”Җв”Җ зҷҪеә• Г— жә«жҪӨи–„иҚ·з¶  в”Җв”Җ */
:root{
  --bg:#ffffff;
  --bg-tint:#f6faf7;
  --surface:#ffffff;
  --surface-2:#f2f7f4;
  --ink:#1f2a24;
  --ink-2:#4a5a52;
  --muted:#8b9a92;
  --rim:#e3ece7;
  --rim-2:#d4e0d9;

  --brand:#4A8F6B;
  --brand-deep:#377054;
  --brand-soft:#E8F3EC;
  --brand-tint:#f0f7f3;

  --accent:#8bb49a;
  --sand:#c8b98c;

  --danger:#c0553f;
  --danger-soft:#fbe9e3;
  --warn:#b07a25;
  --warn-soft:#fbefd5;
  --ok:#4A8F6B;
  --ok-soft:#E8F3EC;

  --shadow-xs:0 1px 2px rgba(20,40,30,.04);
  --shadow-sm:0 2px 6px -2px rgba(30,60,45,.08), 0 1px 2px rgba(30,60,45,.04);
  --shadow:0 8px 24px -12px rgba(30,60,45,.18), 0 2px 4px -2px rgba(30,60,45,.06);
  --radius:16px;
  --radius-lg:22px;
}

body{
  font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei','еҫ®и»ҹжӯЈй»‘й«”',-apple-system,BlinkMacSystemFont,sans-serif;
  background:var(--bg);
  min-height:100vh;color:var(--ink);-webkit-font-smoothing:antialiased;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;
  text-rendering:optimizeLegibility;
  word-break:keep-all;overflow-wrap:break-word;
}

.app{max-width:480px;margin:0 auto;min-height:100vh;background:transparent;position:relative;overflow-x:hidden;}

/* в”Җв”Җ й ӮйғЁ в”Җв”Җ */
.top-bar{
  padding:14px 18px;display:flex;justify-content:space-between;align-items:center;
  position:sticky;top:0;z-index:10;
  background:rgba(255,255,255,.85);
  backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--rim);
}
.brand{font-size:17px;font-weight:700;color:var(--ink);letter-spacing:.02em}
.brand em{font-style:normal;color:var(--brand-deep);font-weight:700}
.cg-pill{
  font-size:12.5px;color:var(--brand-deep);cursor:pointer;
  padding:7px 14px;border:1px solid var(--rim-2);border-radius:999px;
  background:var(--brand-soft);font-weight:600;letter-spacing:.02em;
}
.cg-pill:active{transform:scale(.97)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#c5d1ca;display:inline-block;margin-right:4px;transition:background .3s;vertical-align:1px}
.sync-dot.online{background:var(--brand)}
.sync-dot.syncing{background:var(--sand);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* в”Җв”Җ еҲҶй Ғ в”Җв”Җ */
.tab-bar{
  display:flex;gap:4px;padding:8px;margin:10px 14px 4px;
  background:var(--surface-2);border-radius:14px;border:1px solid var(--rim);
}
.tab{
  flex:1;padding:10px 4px;text-align:center;font-size:13.5px;color:var(--muted);
  cursor:pointer;border-radius:10px;font-weight:600;letter-spacing:.02em;
  transition:all .15s;background:transparent;
}
.tab.active{color:var(--brand-deep);background:#fff;box-shadow:var(--shadow-xs);border:1px solid var(--rim)}

/* в”Җв”Җ жңӘи§Је°ҝжҸҗйҶ’еҲ— в”Җв”Җ */
.ur-bar{
  display:flex;align-items:center;gap:9px;cursor:pointer;
  margin:10px 14px 0;padding:11px 14px;border-radius:12px;
  border:1px solid;font-size:13.5px;font-weight:700;letter-spacing:.02em;
  box-shadow:var(--shadow-xs);
}
.ur-bar .ur-ico{font-size:15px;line-height:1;flex-shrink:0}
.ur-bar .ur-txt{flex:1;line-height:1.4}
.ur-warn{background:var(--warn-soft);border-color:#ecd29d;color:#7a4f11}
.ur-danger{background:var(--danger-soft);border-color:#efc1b2;color:#7a2a1a}
.ur-bar:active{transform:scale(.99)}

/* в”Җв”Җ жҜҸж—Ҙз…§йЎ§иЎЁ checklist в”Җв”Җ */
.care-card{padding:6px 10px}
.care-item{
  display:flex;align-items:center;gap:13px;cursor:pointer;
  padding:14px 10px;border-radius:12px;transition:background .12s;
}
.care-item:active{background:var(--surface-2)}
.care-item + .care-item{border-top:1px solid var(--rim)}
.care-box{
  width:26px;height:26px;flex-shrink:0;border-radius:8px;
  border:2px solid var(--rim-2);background:var(--surface);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:800;color:#fff;line-height:1;transition:all .12s;
}
.care-item.done .care-box{background:var(--brand);border-color:var(--brand)}
.care-name{flex:1;font-size:15.5px;font-weight:600;color:var(--ink);letter-spacing:.02em}
.care-item.done .care-name{color:var(--muted);text-decoration:line-through}
.care-meta{font-size:12px;color:var(--brand-deep);font-weight:600;white-space:nowrap;flex-shrink:0}

.pg{padding:12px 14px 40px}

/* в”Җв”Җ е°ҸзҜҖжЁҷйЎҢ в”Җв”Җ ж”ҫеӨ§пјӢз¶ иүІеј·иӘҝж©«ж§“ */
.sec{
  font-size:15px;font-weight:700;color:var(--ink);
  letter-spacing:.02em;
  margin:32px 2px 18px;
  display:flex;align-items:center;gap:10px;
}
.sec::before{
  content:'';width:4px;height:16px;border-radius:3px;
  background:var(--brand);
}
.sec:first-child{margin-top:10px}

/* в”Җв”Җ еҚЎзүҮ в”Җв”Җ */
.fcard{
    background:var(--surface);border:1px solid var(--rim);
    border-radius:var(--radius-lg);padding:22px 22px 24px;margin-bottom:14px;
    box-shadow:var(--shadow-sm);overflow:hidden;
  }

/* в”Җв”Җ йҖҡз”Ёж¬„дҪҚеҲ— в”Җв”Җ */
.frow{display:grid;grid-template-columns:64px minmax(0,1fr) 40px;align-items:center;gap:12px;margin-bottom:12px}
.frow:last-of-type{margin-bottom:0}
.flbl{font-size:15px;color:var(--ink);text-align:right;font-weight:500;letter-spacing:.04em;padding-right:2px}
.frow input[type=number]{
    width:100%;height:50px;padding:0 20px;
    border:1px solid var(--rim-2);border-radius:16px;
    font-size:16px;background:var(--surface);color:var(--ink);
    text-align:right;-webkit-appearance:none;-moz-appearance:textfield;appearance:none;
    font-family:inherit;font-weight:600;
    transition:all .15s;letter-spacing:.02em;
  }
.frow input[type=number]:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.frow input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
.funit{font-size:13px;color:var(--muted);font-weight:500;text-align:left;letter-spacing:.02em;margin-left:-4px}

/* в”Җв”Җ еҲҶйҡ”з·ҡ в”Җв”Җ */
.divider{border:none;border-top:1px solid var(--rim);margin:18px 0 24px}
.alert-divider{border:none;border-top:1px dashed rgba(0,0,0,.12);margin:8px 0}

/* в”Җв”Җ жҷӮй–“еҲ—пјҡжҷӮй–“ input зё®зҹӯпјҢзҸҫеңЁжҢүйҲ•еҸіз·Ј = зүӣеҘ¶ input еҸіз·Ј в”Җв”Җ */
.trow{
    display:grid;grid-template-columns:64px minmax(0,1fr) 40px;
    align-items:center;gap:12px;margin-bottom:0;
  }
.trow-pad{display:block}
.trow label{
    font-size:15px;color:var(--ink);font-weight:500;
    text-align:right;letter-spacing:.04em;padding-right:2px;
  }
.time-input,
  .trow input[type=text],
  .trow input[type=time]{
    width:100%;height:50px;padding:0 20px;
    border:1px solid var(--rim-2);border-radius:16px;
    font-size:16px;background:var(--surface);color:var(--ink);
    font-family:inherit;font-weight:600;
    cursor:pointer;text-align:center;letter-spacing:.04em;
    -webkit-appearance:none;appearance:none;
    transition:all .15s;
  }
.time-input:focus,.trow input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
.now-btn{
    height:50px;padding:0;width:100%;font-size:14px;border-radius:16px;cursor:pointer;
    border:1px solid var(--rim-2);background:var(--brand-tint);
    color:var(--brand-deep);white-space:nowrap;font-family:inherit;font-weight:700;
    letter-spacing:.04em;transition:all .15s;
  }
  .now-btn:hover{background:var(--brand-soft)}
.now-btn:active{transform:scale(.96)}

/* в”Җв”Җ дё»иҰҒжҢүйҲ• в”Җв”Җ */
.add-btn{
  width:100%;height:50px;border-radius:14px;
  font-size:15.5px;font-weight:700;cursor:pointer;margin-top:24px;
  background:var(--brand);color:#fff;border:none;
  letter-spacing:.06em;font-family:inherit;
  box-shadow:0 6px 16px -8px rgba(74,143,107,.5);
  transition:transform .1s, background .15s;
}
.add-btn:hover{background:var(--brand-deep)}
.add-btn:active{transform:translateY(1px)}

/* в”Җв”Җ иЁҳйҢ„еҲ—иЎЁ в”Җв”Җ */
.rec-list{display:flex;flex-direction:column;gap:9px}
.rec-in,.rec-out,.rec-vt{
  border-radius:14px;padding:11px 10px 11px 14px;
  display:flex;justify-content:space-between;align-items:flex-start;gap:6px;
  background:var(--surface);border:1px solid var(--rim);
  box-shadow:var(--shadow-xs);position:relative;
}
.rec-in::before,.rec-out::before,.rec-vt::before{
  content:'';position:absolute;left:0;top:10px;bottom:10px;width:3px;border-radius:0 3px 3px 0;
}
.rec-in{background:linear-gradient(180deg,#fff,#f4f7fa 100%);border-color:#dce6ee}
.rec-out{background:linear-gradient(180deg,#fff,#fbf5ea 100%);border-color:#eadfc7}
.rec-vt{background:linear-gradient(180deg,#fff,#f5f3ea 100%);border-color:#e5e0cc}
.rec-in::before{background:#3E6B8A}
.rec-out::before{background:#B08248}
.rec-vt::before{background:#9e967b}
.rec-in .rec-time{color:#264a65}
.rec-out .rec-time{color:#7a5723}
.rec-in .rv-val,.rec-out .rv-val,.rec-vt .rv-val{color:inherit}
.rec-in .rv-sub{color:#3E6B8A}
.rec-out .rv-lbl,.rec-in .rv-lbl{color:inherit;opacity:.65}

.rec-left{flex-shrink:0;min-width:48px}
.rec-time{font-size:13px;font-weight:700;color:var(--ink);white-space:nowrap;letter-spacing:.02em}
.rec-cg{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
.rec-right{flex:1;text-align:right}
.rec-del{
  color:var(--muted);cursor:pointer;font-size:20px;line-height:1;
  padding:2px 6px;flex-shrink:0;margin-top:-2px;
  border-radius:8px;transition:all .15s;
}
.rec-del:active{background:var(--danger-soft);color:var(--danger)}

.rv-row{display:flex;justify-content:flex-end;align-items:baseline;gap:4px;line-height:1.9;flex-wrap:wrap}
.rv-pair{display:flex;align-items:baseline;gap:2px}
.rv-lbl{font-size:11px;color:var(--muted);white-space:nowrap;font-weight:600}
.rv-val{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;font-variant-numeric:tabular-nums}
.rv-val.alert{color:var(--danger)}
.rv-unit{font-size:11px;color:var(--muted);white-space:nowrap}
.rv-sep{font-size:11px;color:var(--rim-2)}
.rv-sub{font-size:11px;color:var(--brand-deep);margin-top:3px;text-align:right;font-weight:600}

/* в”Җв”Җ е°ҸиЁҲ в”Җв”Җ */
.subtotal{
  background:var(--brand-tint);border:1px solid var(--rim);
  border-radius:var(--radius);padding:14px 16px;margin-top:12px;
}
.subtotal-title{font-size:12px;font-weight:700;color:var(--brand-deep);margin-bottom:10px;letter-spacing:.06em}
.st-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.st-item{font-size:13px;color:var(--ink);padding:12px 14px;border-radius:12px;background:#fff;border:1px solid var(--rim)}
.st-item strong{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--brand-deep)}
.st-item small{font-size:11.5px;color:var(--muted);font-weight:600}
.st-diff{
  grid-column:1/-1;font-size:14px;font-weight:700;margin-top:8px;
  padding:11px 14px;border-radius:12px;background:#fff;text-align:center;border:1px solid var(--rim);
}
.diff-pos{color:var(--brand-deep)}
.diff-neg{color:var(--danger)}

/* в”Җв”Җ зөұиЁҲеҚЎ в”Җв”Җ */
.sum-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:48px}
.sum-card{
  background:var(--surface);border:1px solid var(--rim);
  border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-xs);
}
.sum-card .sl{font-size:11.5px;color:var(--muted);margin-bottom:6px;font-weight:700;letter-spacing:.06em}
.sum-card .sv{font-size:24px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.sum-card .su{font-size:12px;color:var(--muted);font-weight:600}
.sum-card.full-col{grid-column:1/-1;background:var(--brand-tint);border-color:var(--rim-2)}
.full-col{grid-column:1/-1}

/* в”Җв”Җ жҸҗйҶ’ в”Җв”Җ */
.alert-box{border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;border:1px solid}
.alert-ok{background:var(--ok-soft);border-color:#c7e0d1}
.alert-ok .at{color:var(--brand-deep);font-size:13.5px;font-weight:700;margin-bottom:5px;letter-spacing:.02em}
.alert-ok .ab{color:var(--brand-deep);font-size:13px;line-height:1.7}
.alert-warn{background:var(--warn-soft);border-color:#ecd29d}
.alert-warn .at{color:#7a4f11;font-size:13.5px;font-weight:700;margin-bottom:5px}
.alert-warn .ab{color:#7a4f11;font-size:13px;line-height:1.7}
.alert-danger{background:var(--danger-soft);border-color:#efc1b2}
.alert-danger .at{color:#7a2a1a;font-size:13.5px;font-weight:700;margin-bottom:5px}
.alert-danger .ab{color:#7a2a1a;font-size:13px;line-height:1.7}

/* в”Җв”Җ ең–иЎЁеҲҶй Ғ в”Җв”Җ */
.chart-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.ct{
  padding:8px 14px;border-radius:999px;font-size:13px;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface);color:var(--ink-2);
  font-family:inherit;font-weight:600;transition:all .15s;
}
.ct.active{background:var(--brand);color:#fff;border-color:transparent;box-shadow:0 4px 10px -4px rgba(74,143,107,.4)}
.ct.range-active{background:var(--ink);color:#fff;border-color:transparent}
.ct:active{transform:scale(.96)}

.date-nav{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.date-nav button{
  padding:9px 14px;border-radius:12px;cursor:pointer;font-size:13px;
  border:1px solid var(--rim-2);background:var(--surface);color:var(--ink);
  font-family:inherit;font-weight:600;
}
.date-nav span{flex:1;text-align:center;font-size:14px;font-weight:700;color:var(--ink)}
.date-nav button:disabled{opacity:.4;cursor:default}

.export-btn{
  width:100%;height:48px;border-radius:14px;font-size:14px;cursor:pointer;
  margin-top:14px;border:1px solid var(--rim-2);
  background:var(--surface);color:var(--ink);font-weight:700;font-family:inherit;
}
.export-btn:active{transform:translateY(1px)}

.empty{text-align:center;padding:28px 0;color:var(--muted);font-size:13px;font-weight:500}

/* в”Җв”Җ Modal в”Җв”Җ */
.modal-bg{
  position:fixed;inset:0;background:rgba(20,40,30,.38);
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;
}
.modal-box{
  background:var(--surface);border-radius:22px;padding:24px;
  width:100%;max-width:340px;
  box-shadow:0 30px 60px -24px rgba(0,0,0,.3), 0 0 0 1px var(--rim);
}
.modal-box h3{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--ink)}
.modal-box input[type=text]{
  width:100%;height:46px;padding:0 14px;border:1px solid var(--rim-2);border-radius:12px;
  font-size:16px;margin-bottom:12px;background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-weight:500;
}
.modal-box input[type=text]:focus{outline:none;border-color:var(--brand);background:#fff}
.qnames{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.qn{
  padding:9px 18px;border-radius:999px;font-size:14px;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-weight:600;
}
.qn:active{background:var(--brand);color:#fff;border-color:transparent}
.modal-ok{
  width:100%;height:48px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  background:var(--brand);color:#fff;border:none;font-family:inherit;
  box-shadow:0 4px 12px -4px rgba(74,143,107,.4);
}
.toast-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:10px}
.toast-body{font-size:13.5px;color:var(--ink-2);line-height:1.9;margin-bottom:18px}
.toast-ok{
  width:100%;height:48px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;
  background:var(--brand);color:#fff;border:none;font-family:inherit;
}
.confirm-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:8px}
.confirm-body{font-size:13.5px;color:var(--ink-2);margin-bottom:20px;line-height:1.7}
.confirm-btns{display:flex;gap:10px}
.confirm-btns .c-cancel{
  flex:1;height:46px;border-radius:12px;font-size:14px;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-weight:600;
}
.confirm-btns .c-del{
  flex:1;height:46px;border-radius:12px;font-size:14px;font-weight:700;cursor:pointer;
  background:var(--danger);color:#fff;border:none;font-family:inherit;
  box-shadow:0 4px 12px -4px rgba(192,85,63,.4);
}

/* в”Җв”Җ жҷӮй–“йҒёж“ҮеҷЁ Modal в”Җв”Җ */
.time-modal{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:480px;background:var(--surface);
  border-radius:24px 24px 0 0;padding:24px 16px 36px;
  box-shadow:0 -10px 40px rgba(20,40,30,.15);z-index:200;
  border-top:1px solid var(--rim);
}
.time-modal h4{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:20px;text-align:center;letter-spacing:.04em}
.time-ampm-row{display:flex;gap:8px;margin-bottom:14px}
.time-ampm-btn{
  flex:1;height:56px;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;
  border:1px solid var(--rim-2);background:var(--surface-2);color:var(--ink-2);
  font-family:inherit;letter-spacing:.04em;
}
.time-ampm-btn.sel-active{
  background:var(--brand);color:#fff;border-color:transparent;
  box-shadow:0 4px 12px -4px rgba(74,143,107,.45);
}
.time-hm-row{display:flex;align-items:center;gap:8px;margin-bottom:22px}
.time-hm-row input{
  flex:1;min-width:0;height:56px;padding:0 8px;border:1px solid var(--rim-2);border-radius:14px;
  font-size:22px;font-weight:700;text-align:center;
  background:var(--surface-2);color:var(--ink);
  font-family:inherit;font-variant-numeric:tabular-nums;

function fmt12(val24){
  if(!val24) return '';
  const [hh,mm]=val24.split(':');
  let h=parseInt(hh),m=parseInt(mm)||0;
  const ampm=h<12?t('дёҠеҚҲ'):t('дёӢеҚҲ');

  return ampm+' '+h+':'+(m<10?'0':'')+m;
}
function dkFmt(dateStr){
  // жҠҠ "2026-04-22" иҪүжҲҗ "04/22 (дёү)"
  if(!dateStr) return '';
  const [y,mo,d]=dateStr.split('-');
  const dt=new Date(parseInt(y),parseInt(mo)-1,parseInt(d));
  const wdays=['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'];
  return mo+'/'+d+' ('+wdays[dt.getDay()]+')';
}

function calcTotals(recs){
  let inW=0,outW=0;
  recs.forEach(r=>{
    if(r.t==='in')inW+=milkW(r.milk||0)+(r.water||0)+(r.mw||0);
    if(r.t==='out')outW+=(r.urine||0);
  });
  return{inW,outW,diff:inW-outW};
}

function buildVTRecHTML(r,showDel){

  const cols=[];
  if(r.temp!=null)cols.push(`<div class="vt-col"><div class="vt-lbl">${t('й«”жә«')}</div><div class="vt-val ${ac(tempAlert(r.temp))}">${r.temp}<span class="vt-unit"> В°C</span></div></div>`);

// в”Җв”Җ и§ЈдҫҝзӣЈжё¬ в”Җв”Җ
function getStoolInfo(){
  const now=new Date();
  // жүҫжүҖжңүи§ЈдҫҝзҙҖйҢ„пјҲе…Ёжӯ·еҸІпјҢи·Ёж—Ҙпјү
  const allStoolRecs=sortT(ioRecs.filter(r=>r.t==='out'&&r.stool&&r2d(r)<=now));
  if(!allStoolRecs.length) return{totalHrs:0,hrs:0,days:0,mins:0,label:'е°ҡз„Ўи§ЈдҫҝзҙҖйҢ„',lastTwo:[],level:'ok'};
  const lastRec=allStoolRecs[allStoolRecs.length-1];
  const lastTime=r2d(lastRec);
  const sinceMs=now-lastTime;
  const totalHrs=Math.floor(sinceMs/3600000);
  const days=Math.floor(totalHrs/24);
  const hrs=totalHrs%24;
  const mins=Math.floor((sinceMs%3600000)/60000);
  // ж—ҘжңҹжЁҷзӨә
  const dateStr=lastRec.date===dk()?'':lastRec.date.slice(5)+' ';
  let label='';
  if(days>0) label=`и·қдёҠж¬Ўи§ЈдҫҝпјҲ${dateStr}${lastRec.time}пјүе·І ${days} еӨ© ${hrs} е°ҸжҷӮ`;
  else label=`и·қдёҠж¬Ўи§ЈдҫҝпјҲ${dateStr}${lastRec.time}пјүе·І ${hrs} е°ҸжҷӮ ${mins} еҲҶ`;
  // жңҖиҝ‘е…©зӯҶ
  const lastTwo=allStoolRecs.slice(-2).reverse();
  // з¬¬3еӨ©пјҲ72е°ҸжҷӮпјүи®Ҡзҙ…
  // и¶…йҒҺ 48 е°ҸжҷӮзӣҙжҺҘзҙ…иүІиӯҰзӨә
  const level=totalHrs>=48?'danger':'ok';
  return{totalHrs,days,hrs,mins,label,lastTwo,level};
}

function buildStoolAlert(){
  const si=getStoolInfo();
  const aC=si.level==='danger'?'alert-danger':si.level==='warn'?'alert-warn':'alert-ok';
  const aI=si.level==='danger'?'иӯҰе‘Ҡпјҡ':si.level==='warn'?'жҸҗйҶ’пјҡ':'';
  const lastTwoHTML=si.lastTwo.map(r=>{
    const dStr=r.date===dk()?'':r.date.slice(5)+' ';
    return `<div class="ab">${dStr}${r.time}гҖҖ${r.stool}</div>`;
  }).join('');
  return `<div class="alert-box ${aC}" style="margin-bottom:48px">
    <div class="at">${aI}и§ЈдҫҝзҙҖйҢ„</div>
    <div class="ab">${si.label}</div>
    ${si.lastTwo.length?`<hr class="alert-divider"/><div class="ab" style="font-size:11px;opacity:0.8;margin-bottom:3px">жңҖиҝ‘е…©ж¬Ўпјҡ</div>${lastTwoHTML}`:''}
  </div>`;
}

// в”Җв”Җ TAB 3 в”Җв”Җ
function getUA(){
  const now=new Date(),cs=cycleStart();
  // и§Је°ҝпјҡжҗңе°ӢжүҖжңүжӯ·еҸІзҙҖйҢ„пјҲи·Ёж—ҘпјүпјҢжүҫжңҖиҝ‘дёҖж¬Ў
  const allUrineRecs=sortT(ioRecs.filter(r=>r.t==='out'&&r.urine&&r2d(r)<=now));
  let lastT=null,sinceMs=0,label='';
  if(!allUrineRecs.length){
    lastT=cs; sinceMs=now-cs;
    label=t('е°ҡз„Ўи§Је°ҝзҙҖйҢ„пјҲ07:00 иө·з®—пјү');
  }else{
    const lastRec=allUrineRecs[allUrineRecs.length-1];
    lastT=r2d(lastRec); sinceMs=now-lastT;
    const dateStr=lastRec.date===dk()?'':lastRec.date.slice(5)+' ';
    label=`и·қдёҠж¬Ўи§Је°ҝпјҲ${dateStr}${lastRec.time}пјү`;
  }
  // жҺ’дҫҝпјҡжүҫгҖҢдёҠж¬Ўи§Је°ҝд№ӢеҫҢгҖҚеҲ°зҸҫеңЁзҡ„еӨ§дҫҝзҙҖйҢ„
  const sRecs=sortT(ioRecs.filter(r=>{if(r.t!=='out'||!r.stool)return false;const rt=r2d(r);return rt>=lastT&&rt<=now;}));
  const hrs=Math.floor(sinceMs/3600000),mins=Math.floor((sinceMs%3600000)/60000);
  const inAfter=ioRecs.filter(r=>{if(r.t!=='in')return false;const rt=r2d(r);return rt>=lastT&&rt<=now;}).reduce((s,r)=>s+milkW(r.milk||0)+(r.water||0)+(r.mw||0),0);
  return{hrs,mins,inAfter,label,level:hrs>=8?'danger':hrs>=6?'warn':'ok',sRecs};
}

  const ua=getUA();
  const aC=ua.level==='danger'?'alert-danger':ua.level==='warn'?'alert-warn':'alert-ok';
  const aI=ua.level==='danger'?t('иӯҰе‘Ҡпјҡ'):ua.level==='warn'?t('жҸҗйҶ’пјҡ'):t('жӯЈеёёпјҡ');

function renderApptPage(){
  const now = new Date();
  now.setHours(0,0,0,0);
  
  // еҲҶйЎһ
  // д»Ҙжң¬ең°жҷӮеҚҖжҠҠ "YYYY-MM-DD" и§ЈжһҗзӮәз•¶еӨ© 00:00пјҢйҒҝе…Қиў«з•¶жҲҗ UTC иҖҢдҪҚз§»дёҖеӨ©
  const pd = s => { const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); };
  const future = apptRecs.filter(a => pd(a.date) >= now);
  const past = apptRecs.filter(a => pd(a.date) < now);
  
  // жҢүз—…дәәеҲҶзө„пјҲfutureпјү
  const futurePatients = {};
  future.forEach(a => {
    if(!futurePatients[a.patient]) futurePatients[a.patient]=[];
    futurePatients[a.patient].push(a);
  });
  // еҗ„иҮӘжҢүж—ҘжңҹжҺ’еәҸ
  Object.keys(futurePatients).forEach(k => {
    futurePatients[k].sort((a,b)=> pd(a.date) - pd(b.date));
  });
  
  // past жҢүж—ҘжңҹеҖ’еәҸ
  past.sort((a,b)=> pd(b.date) - pd(a.date));
  
  const patientOrder = ['ејҹејҹ','еӘҪеӘҪ'];
  let html = `

  </div>`;
  
  patientOrder.forEach(p => {
    const list = futurePatients[p] || [];
    if(list.length === 0 && !apptRecs.some(a=>a.patient===p)) return;
    html += `<div class="sec" style="margin-top:24px">${p}</div>`;
    if(list.length === 0){
      html += `<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">е°ҡз„ЎеҚіе°ҮеӣһиЁә</div>`;
    } else {
      list.forEach(a => {
        const days = Math.round((pd(a.date) - now) / 86400000);
        const isWarn = days >= 0 && days <= 7;
        const cardBorder = isWarn ? '#ecd29d' : 'var(--rim)';
        const dateBg = a.patient === 'ејҹејҹ' ? '#fbe5cc' : '#dbeaf5';

        const badge = days === 0 ? 'д»ҠеӨ©' : days === 1 ? 'жҳҺеӨ©' : days <= 7 ? days+' еӨ©еҫҢ' : '';
        const [_y,_m,_d] = a.date.split('-');
        const wdays = ['ж—Ҙ','дёҖ','дәҢ','дёү','еӣӣ','дә”','е…ӯ'];
        const _wk = wdays[new Date(parseInt(_y),parseInt(_m)-1,parseInt(_d)).getDay()];
        const _M = parseInt(_m), _D = parseInt(_d);
        const numStr = String(a.num||'');
        const numFontSize = numStr.length >= 4 ? '22px' : '28px';
        html += `
        <div style="background:#fff;border:1px solid ${cardBorder};border-radius:18px;padding:14px;margin-bottom:10px;display:flex;align-items:stretch;gap:10px;min-height:130px;overflow:hidden">

            <div style="font-size:24px;font-weight:700;color:${dateText};line-height:1.05;font-variant-numeric:tabular-nums">${_M}/${_D}</div>
            <div style="height:1px;background:${dateLine};width:62%;margin:8px 0"></div>
            <div style="font-size:13px;font-weight:700;color:${dateText};white-space:nowrap">йҖұ${_wk} ${a.session||''}</div>
          </div>
          <div style="flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:4px;padding:0 6px">
            <div style="font-size:19px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.hospital||''}</div>
            <div style="font-size:16px;font-weight:700;color:var(--ink-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.dept||''}</div>
            ${a.doctor?`<div style="font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${a.doctor}</div>`:''}
          </div>
          <div style="flex-shrink:0;width:74px;background:#E8F3EC;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px;position:relative">
            ${isWarn && badge ? `<div style="position:absolute;top:4px;left:50%;transform:translateX(-50%);font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:9px;background:#b07a25;color:#fff;white-space:nowrap">${badge}</div>` : ''}
            <div style="font-size:${numFontSize};font-weight:700;color:#377054;line-height:1;font-variant-numeric:tabular-nums;${isWarn && badge ? 'margin-top:18px;' : ''}">${numStr}</div>
            <div style="font-size:10.5px;color:#377054;margin-top:3px;font-weight:600">иҷҹ</div>
          </div>
          <span onclick="window.confirmDelAppt('${a.id}')" style="flex-shrink:0;align-self:center;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:6px 2px">Г—</span>
        </div>`;
      });
    }
  });
  
  if(past.length > 0){
    html += `<div class="sec" style="margin-top:32px;color:var(--muted)"><span style="background:var(--muted)!important"></span>е·ІйҒҺжңҹ</div>`;
    past.forEach(a => {
      html += `
      <div style="background:#f8f9f8;border:1px solid var(--rim);border-radius:14px;padding:12px 14px 12px 18px;margin-bottom:10px;position:relative;opacity:.85">
        <div style="position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:0 3px 3px 0;background:#c5d1ca"></div>
        <div style="font-size:13px;font-weight:600;color:var(--muted)">${dkFmt(a.date)}гҖҖ${a.session||''}гҖҖ${a.num||''} иҷҹгҖҖ<span style="display:inline-block;font-size:10px;padding:2px 7px;border-radius:8px;background:#e3ece7;color:var(--muted);font-weight:700">${a.patient}</span></div>
        <div style="font-size:13px;color:var(--muted);margin-top:5px">${a.hospital||''}гҖҖ${a.dept||''}</div>
        ${a.doctor?`<div style="font-size:11px;color:var(--muted);margin-top:2px">${a.doctor}</div>`:''}
      </div>`;
    });
  }
  
  if(apptRecs.length === 0){
    html += `<div style="text-align:center;padding:40px 20px;color:var(--muted)">е°ҡз„ЎжҺӣиҷҹзҙҖйҢ„<br/><span style="font-size:12px">й»һеҸідёҠгҖҢпјӢ ж–°еўһгҖҚеҠ е…Ҙз¬¬дёҖзӯҶ</span></div>`;
  }
  
  C().innerHTML = html;
}

let _apptPatient = 'ејҹејҹ';
let _apptSession = 'дёҠеҚҲ';
window.selApptPatient = function(p){
  _apptPatient = p;
  ['ејҹејҹ','еӘҪеӘҪ'].forEach(x=>{
    const b = document.getElementById('ap-p-'+x);
    if(!b) return;
    if(x===p){
      b.className='sel-btn selected';
      b.style.background='var(--brand)';
      b.style.color='#fff';
      b.style.borderColor='transparent';
    } else {
      b.className='sel-btn';
      b.style.background='';
      b.style.color='';
      b.style.borderColor='';
    }
  });
};
window.selApptSession = function(s){
  _apptSession = s;
  ['дёҠеҚҲ','дёӢеҚҲ','еӨңй–“'].forEach(x=>{
    const b = document.getElementById('ap-s-'+x);
    if(!b) return;
    if(x===s){
      b.className='sel-btn selected';
      b.style.background='var(--brand)';
      b.style.color='#fff';
      b.style.borderColor='transparent';
    } else {
      b.className='sel-btn';
      b.style.background='';
      b.style.color='';
      b.style.borderColor='';
    }
  });
};

window.saveAppt = function(){
  if(!cgName){showNameModal();return;}
  const hospital = el('ap-hospital').value.trim();
  const dept = el('ap-dept').value.trim();
  const doctor = el('ap-doctor').value.trim();
  const date = el('ap-date').value;
  const session = _apptSession;
  const num = el('ap-num').value.trim();
  if(!hospital||!dept||!date||!session||!num){
    showToast('иіҮж–ҷдёҚе®Ңж•ҙ',['и«ӢеЎ«еҜ«йҶ«йҷўгҖҒз§‘еҲҘгҖҒж—ҘжңҹгҖҒжҷӮж®өгҖҒзңӢиЁәиҷҹзўјпјҲйҶ«её«еҸҜйҒёеЎ«пјү']);
    return;
  }
  if(_apptEditId){
    apptRecs = apptRecs.map(a=> a.id===_apptEditId ? {...a, patient:_apptPatient, hospital, dept, doctor, date, session, num} : a);
  } else {
    apptRecs.push({id:String(Date.now()), patient:_apptPatient, hospital, dept, doctor, date, session, num, cg:cgName});
  }
  saveAll();
  M().innerHTML='';
  renderApptPage();
};

window.confirmDelAppt = function(id){
  const a = apptRecs.find(x=>x.id===id);
  if(!a)return;
  showConfirm('зўәиӘҚеҲӘйҷӨпјҹ',`${a.patient}гҖҖ${dkFmt(a.date)} ${a.session||''} ${a.num||''}иҷҹгҖҖ${a.hospital||''}гҖҖ${a.dept||''}`,()=>{
    apptRecs = apptRecs.filter(x=>x.id!==id);
    M().innerHTML='';
    saveAll();
    renderApptPage();
  });
};

<script>
(function(){
  let deferredPrompt = null;
  const KEY = 'pwa_install_dismissed';

  function showBanner(isIOS) {
    if (document.getElementById('install-banner')) return;
    const b = document.createElement('div');
    b.id = 'install-banner';
    b.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:448px;background:#fff;border:1px solid #e3ece7;border-radius:18px;padding:14px 16px;box-shadow:0 8px 24px -8px rgba(30,60,45,.25);z-index:999;';
    if (isIOS) {
      b.innerHTML = '<div style="display:flex;align-items:center;gap:12px;margin-bottom:10px"><img src="icon-192.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0"/><div style="flex:1"><div style="font-size:14px;font-weight:700;color:#1f2a24;margin-bottom:2px">еҠ е…Ҙдё»з•«йқў</div><div style="font-size:12px;color:#8b9a92">еғҸ App дёҖжЁЈеҝ«йҖҹй–Ӣе•ҹ</div></div><button onclick="document.getElementById(\'install-banner\').remove()" style="height:32px;width:32px;border-radius:8px;background:#f2f7f4;color:#8b9a92;border:none;font-size:18px;cursor:pointer">Г—</button></div><div style="font-size:12px;color:#4a5a52;background:#f0f7f3;border-radius:10px;padding:10px 12px;line-height:1.8">й»һеә•йғЁ<strong>еҲҶдә«</strong>жҢүйҲ•вҶ’йҒёгҖҢ<strong>еҠ е…Ҙдё»з•«йқў</strong>гҖҚ</div>';
    } else {
      b.innerHTML = '<div style="display:flex;align-items:center;gap:12px"><img src="icon-192.png" style="width:44px;height:44px;border-radius:10px;flex-shrink:0"/><div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:700;color:#1f2a24;margin-bottom:2px">еҠ е…Ҙдё»з•«йқў</div><div style="font-size:12px;color:#8b9a92">еғҸ App дёҖжЁЈеҝ«йҖҹй–Ӣе•ҹ</div></div><button onclick="window._pwaInstall()" style="height:36px;padding:0 16px;border-radius:10px;background:#4A8F6B;color:#fff;border:none;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0">е®үиЈқ</button><button onclick="document.getElementById(\'install-banner\').remove()" style="height:36px;width:36px;border-radius:10px;background:#f2f7f4;color:#8b9a92;border:none;font-size:18px;cursor:pointer;flex-shrink:0">Г—</button></div>';
    }
    document.body.appendChild(b);
  }

  window._pwaInstall = async function() {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('install-banner') && document.getElementById('install-banner').remove();
    if (outcome === 'accepted') localStorage.setItem(KEY, '1');
  };

  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    if (!localStorage.getItem(KEY)) setTimeout(function(){ showBanner(false); }, 2000);
  });

  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone && !localStorage.getItem(KEY)) {
    setTimeout(function(){ showBanner(true); }, 2000);
  }
})();
</script>
